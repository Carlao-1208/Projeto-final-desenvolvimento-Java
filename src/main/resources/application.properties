# Configuração do Banco de Dados MySQL - TUDO EM UMA LINHA!
spring.datasource.url=jdbc:mysql://localhost:3306/biblioteca?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Remova a linha do dialect ou use a correta para sua versão:
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect