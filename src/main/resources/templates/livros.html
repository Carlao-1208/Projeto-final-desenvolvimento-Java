<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Livros</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1000px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .btn-novo {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 20px;
            background: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 5px;
            overflow: hidden;
        }
        th {
            background: #333;
            color: white;
            padding: 12px;
            text-align: left;
        }
        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            color: #333;
        }
        tr:hover {
            background-color: #f5f5f5;
        }
        .btn-deletar {
            color: #f44336;
            text-decoration: none;
            font-weight: bold;
        }
        .btn-voltar {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #666;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📖 Lista de Livros</h1>
        
        <a href="/livros/novo" class="btn-novo">➕ Novo Livro</a>
        
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Título</th>
                    <th>Autor</th>
                    <th>ISBN</th>
                    <th>Ano</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="livro : ${livros}">
                    <td th:text="${livro.id}">1</td>
                    <td th:text="${livro.titulo}">Dom Casmurro</td>
                    <td th:text="${livro.autor}">Machado de Assis</td>
                    <td th:text="${livro.isbn}">978-85-1234-567-8</td>
                    <td th:text="${livro.anoPublicacao}">1899</td>
                    <td>
                        <a th:href="@{'/livros/deletar/' + ${livro.id}}" 
                           class="btn-deletar"
                           onclick="return confirm('Tem certeza que deseja deletar este livro?')">
                           🗑️ Deletar
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
        
        <a href="/" class="btn-voltar">⬅️ Voltar ao Início</a>
    </div>
</body>
</html>
